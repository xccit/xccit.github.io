            <h1 id="UBUNTU配置SSH"><a href="#UBUNTU配置SSH" class="headerlink" title="UBUNTU配置SSH"></a>UBUNTU配置SSH</h1><blockquote>
<p>author:xccit</p>
<p>title: Ununtu配置SSH</p>
</blockquote>
<h2 id="开启root用户"><a href="#开启root用户" class="headerlink" title="开启root用户:"></a>开启root用户:</h2><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">sudo passwd root</span><br><span class="line">设置root密码</span><br></pre></td></tr></table></figure>



<h2 id="安装SSH："><a href="#安装SSH：" class="headerlink" title="安装SSH："></a>安装SSH：</h2><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">sudo apt install openssh-server</span><br><span class="line">sudo apt install openssh-client</span><br><span class="line">sudo service ssh start</span><br><span class="line">sudo apt install vim</span><br><span class="line">sudo vim /etc/ssh/sshd_config</span><br></pre></td></tr></table></figure>

<p>接下来会进入一个文件:按<strong>i</strong>进入insert模式:</p>
<p><img src="/2022/04/09/UBUNTU%E9%85%8D%E7%BD%AESSH/image-20220326234151333.png" alt="UBUNTU配置SSH.assets/image-20220326234151333.png"></p>
<p>修改这里，将框起来的第一句前面有#就别管，没#就加上#</p>
<p>第二句必须自己打上去 注意大小写</p>
<p>然后按esc 输入:wq</p>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">sudo service ssh restart</span><br></pre></td></tr></table></figure>

<p>使用Xshell，输入IP，用户名填写root 然后输入root密码 成功使用root用户连接SSH</p>
<p><img src="/2022/04/09/UBUNTU%E9%85%8D%E7%BD%AESSH/image-20220326234528751.png" alt="UBUNTU配置SSH.assets/image-20220326234528751.png"></p>
<p>通过命令查看 当前用户是root</p>
